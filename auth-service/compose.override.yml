# Automatically merged by `docker compose` for local development.
# Also usable with local Docker Swarm:
#   docker stack deploy -c compose.yml -c compose.override.yml auth-service
#
# File-based secrets override the external: true definitions in compose.yml so
# neither Docker secrets nor a registry are required locally.
# Run .\..\..\backend-framework\scripts\create-secrets.ps1 first.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stuff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stuff_auth
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stuff}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  auth-service:
    image: arnodece/stuff-auth-service:dev
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "8001:8000"
    deploy:
      replicas: 1

secrets:
  database_url:
    file: ./secrets/database_url
    external: false
  auth_secret:
    file: ./secrets/auth_secret
    external: false

volumes:
  postgres_data:
