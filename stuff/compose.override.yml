# Automatically merged by `docker compose` for local development.
# Also usable with local Docker Swarm:
#   docker stack deploy -c compose.yml -c compose.override.yml stuff
#
# Uses port 5433 for postgres so it can run alongside auth-service (port 5432)
# without a host port conflict.
#
# Run .\..\backend-framework\scripts\create-secrets.ps1 first.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stuff}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stuff_backend
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stuff}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: arnodece/stuff-backend:dev
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - postgres
    restart: on-failure
    ports:
      - "8000:8000"
    deploy:
      replicas: 1

secrets:
  database_url:
    file: ./secrets/database_url
    external: false
  auth_secret:
    file: ./secrets/auth_secret
    external: false

volumes:
  postgres_data:
